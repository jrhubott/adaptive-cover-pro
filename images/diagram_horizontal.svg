<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 450" width="780" height="450" font-family="sans-serif">
  <!-- Background -->
  <rect width="780" height="450" fill="white"/>

  <!-- Title -->
  <text x="390" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Horizontal Awning — Side Elevation View</text>

  <!-- ===== INTERIOR REGION (right of wall) ===== -->
  <rect x="475" y="50" width="255" height="330" fill="#f5f0e8" rx="0"/>
  <text x="600" y="76" text-anchor="middle" font-size="13" fill="#999" font-style="italic">Inside</text>

  <!-- Interior ceiling -->
  <rect x="475" y="50" width="255" height="14" fill="#888" rx="2"/>
  <!-- Interior floor -->
  <rect x="475" y="380" width="255" height="16" fill="#888" rx="2"/>

  <!-- ===== EXTERIOR GROUND ===== -->
  <rect x="60" y="380" width="415" height="16" fill="#888" rx="2"/>
  <!-- Ground hatch lines (outside) -->
  <line x1="80"  y1="396" x2="70"  y2="410" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="396" x2="90"  y2="410" stroke="#666" stroke-width="1"/>
  <line x1="120" y1="396" x2="110" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="140" y1="396" x2="130" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="160" y1="396" x2="150" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="180" y1="396" x2="170" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="200" y1="396" x2="190" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="220" y1="396" x2="210" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="240" y1="396" x2="230" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="260" y1="396" x2="250" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="280" y1="396" x2="270" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="300" y1="396" x2="290" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="320" y1="396" x2="310" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="340" y1="396" x2="330" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="360" y1="396" x2="350" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="380" y1="396" x2="370" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="400" y1="396" x2="390" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="420" y1="396" x2="410" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="440" y1="396" x2="430" y2="410" stroke="#666" stroke-width="1"/>
  <line x1="460" y1="396" x2="450" y2="410" stroke="#666" stroke-width="1"/>

  <!-- ===== WALL ===== -->
  <rect x="443" y="50" width="32" height="330" fill="#aaa" rx="2"/>

  <!-- ===== WINDOW (opening in wall) ===== -->
  <rect x="443" y="130" width="32" height="162" fill="#add8e6" opacity="0.8"/>
  <text x="459" y="218" text-anchor="middle" font-size="10" fill="#225577" writing-mode="tb">Window</text>
  <!-- Window frame lines -->
  <line x1="443" y1="130" x2="475" y2="130" stroke="#555" stroke-width="2.5"/>
  <line x1="443" y1="292" x2="475" y2="292" stroke="#555" stroke-width="2.5"/>

  <!-- ===== AWNING ===== -->
  <!-- Mount just above window top (y=130): bracket at y=99-123, tip extends left to (178,119) -->
  <!-- Top face: (443,101) to (178,119); Bottom face: (178,134) to (443,116) -->
  <polygon points="443,101 178,119 178,134 443,116" fill="#5588cc" stroke="#2255aa" stroke-width="2" opacity="0.9"/>
  <!-- Mount bracket -->
  <rect x="435" y="97" width="14" height="24" fill="#555" rx="2"/>

  <!-- ===== AWNING HEIGHT DIMENSION ===== -->
  <!-- Vertical arrow: ground(y=380) to mount(y=109), right of wall -->
  <line x1="530" y1="109" x2="530" y2="380" stroke="#1a6a1a" stroke-width="1.5"/>
  <polygon points="530,109 525,121 535,121" fill="#1a6a1a"/>
  <polygon points="530,380 525,368 535,368" fill="#1a6a1a"/>
  <line x1="518" y1="109" x2="542" y2="109" stroke="#1a6a1a" stroke-width="1.5"/>
  <line x1="518" y1="380" x2="542" y2="380" stroke="#1a6a1a" stroke-width="1.5"/>
  <!-- Dashed guide from wall to dim line -->
  <line x1="475" y1="109" x2="530" y2="109" stroke="#1a6a1a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="546" y="226" font-size="12" fill="#1a6a1a" font-weight="bold">Awning</text>
  <text x="546" y="242" font-size="12" fill="#1a6a1a" font-weight="bold">Height</text>
  <text x="546" y="258" font-size="11" fill="#1a6a1a">(e.g. 2 m)</text>

  <!-- ===== AWNING LENGTH DIMENSION ===== -->
  <!-- Horizontal arrow at y=218, from tip(x=178) to wall(x=443) -->
  <line x1="178" y1="218" x2="443" y2="218" stroke="#aa5500" stroke-width="1.5"/>
  <polygon points="178,218 190,213 190,223" fill="#aa5500"/>
  <polygon points="443,218 431,213 431,223" fill="#aa5500"/>
  <line x1="178" y1="206" x2="178" y2="230" stroke="#aa5500" stroke-width="1.5"/>
  <line x1="443" y1="206" x2="443" y2="230" stroke="#aa5500" stroke-width="1.5"/>
  <!-- Dotted guide from awning tip down to dim line -->
  <line x1="178" y1="123" x2="178" y2="218" stroke="#aa5500" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="311" y="210" text-anchor="middle" font-size="12" fill="#aa5500" font-weight="bold">Awning Length</text>
  <text x="311" y="245" text-anchor="middle" font-size="11" fill="#aa5500">(horizontal, e.g. 2.1 m)</text>

  <!-- ===== AWNING ANGLE ===== -->
  <!-- Horizontal reference line at mount height (y=109) -->
  <line x1="330" y1="109" x2="443" y2="109" stroke="#7700aa" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Small arc from horizontal to awning top surface, center at mount (443,109) -->
  <path d="M 383,109 A 60,60 0 0,0 380.8,114.4" fill="none" stroke="#7700aa" stroke-width="2"/>
  <text x="310" y="97" font-size="12" fill="#7700aa" font-weight="bold">Awning Angle</text>
  <text x="310" y="111" font-size="11" fill="#7700aa">(e.g. 5°)</text>

  <!-- ===== GLARE ZONE (interior floor — where sun ray hits) ===== -->
  <!-- Sun ray hits interior floor at x=711. Glare zone = wall interior (x=475) to floor hit (x=711) -->
  <rect x="475" y="355" width="236" height="25" fill="#ffcccc" opacity="0.6"/>
  <!-- Horizontal arrow from wall interior to floor hit point -->
  <line x1="475" y1="368" x2="711" y2="368" stroke="#aa2222" stroke-width="1.5"/>
  <polygon points="475,368 487,363 487,373" fill="#aa2222"/>
  <polygon points="711,368 699,363 699,373" fill="#aa2222"/>
  <line x1="475" y1="356" x2="475" y2="380" stroke="#aa2222" stroke-width="1.5"/>
  <line x1="711" y1="356" x2="711" y2="380" stroke="#aa2222" stroke-width="1.5"/>
  <text x="593" y="415" text-anchor="middle" font-size="12" fill="#aa2222" font-weight="bold">Glare Zone</text>
  <text x="593" y="430" text-anchor="middle" font-size="11" fill="#aa2222">(e.g. 0.5 m)</text>
  <!-- Dotted guide from awning tip down to exterior ground -->
  <line x1="178" y1="134" x2="178" y2="380" stroke="#888" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ===== SUN (outside, upper-left, plenty of space) ===== -->
  <circle cx="82" cy="72" r="32" fill="#FFD700" stroke="#cc9900" stroke-width="2"/>
  <!-- Sun rays -->
  <line x1="82" y1="33"  x2="82" y2="24"  stroke="#cc9900" stroke-width="2.5"/>
  <line x1="82" y1="111" x2="82" y2="120" stroke="#cc9900" stroke-width="2.5"/>
  <line x1="43" y1="72"  x2="34" y2="72"  stroke="#cc9900" stroke-width="2.5"/>
  <line x1="121" y1="72" x2="130" y2="72" stroke="#cc9900" stroke-width="2.5"/>
  <line x1="55"  y1="45" x2="49"  y2="39" stroke="#cc9900" stroke-width="2"/>
  <line x1="109" y1="99" x2="115" y2="105" stroke="#cc9900" stroke-width="2"/>
  <line x1="55"  y1="99" x2="49"  y2="105" stroke="#cc9900" stroke-width="2"/>
  <line x1="109" y1="45" x2="115" y2="39" stroke="#cc9900" stroke-width="2"/>
  <text x="82" y="79" text-anchor="middle" font-size="20">☀</text>
  <text x="82" y="160" text-anchor="middle" font-size="12" fill="#664400" font-weight="bold">Outside</text>

  <!-- ===== SUN RAY ===== -->
  <!-- Sun at (82,72). Ray grazes awning tip top-edge at (178,119).                       -->
  <!-- Slope = (119-72)/(178-82) = 47/96 = 0.490                                         -->
  <!-- At x=443 (wall exterior): y = 72 + 0.490*361 = 249  → inside window (130-292) ✓  -->
  <!-- At x=475 (wall interior): y = 72 + 0.490*393 = 265                                -->
  <!-- Floor hit (y=380): x = 82 + 308/0.490 = 711 → inside SVG ✓                       -->

  <!-- Outside segment: from sun edge to wall/window exterior -->
  <line x1="111" y1="88" x2="443" y2="249" stroke="#FFB300" stroke-width="2.5" stroke-dasharray="11,5"/>
  <!-- Inside segment: enters window and hits interior floor -->
  <line x1="475" y1="265" x2="711" y2="380" stroke="#FFB300" stroke-width="2.5" stroke-dasharray="11,5"/>
  <!-- Arrowhead at interior floor hit -->
  <polygon points="711,380 700,370 713,371" fill="#FFB300"/>
</svg>
