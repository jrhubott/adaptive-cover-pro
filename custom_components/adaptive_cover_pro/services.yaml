integration_enable:
  name: Enable integration
  description: >-
    Re-enables Adaptive Cover Pro on the targeted instances. Covers stay where they
    are; positioning resumes on the next natural update cycle.
  target:
    entity:
      integration: adaptive_cover_pro

integration_disable:
  name: Disable integration
  description: >-
    Disables Adaptive Cover Pro on the targeted instances. Any ACP-in-flight cover
    moves are stopped immediately (cover.stop_cover). Deferred motion and weather
    timers are cancelled and reconciliation state is cleared.
  target:
    entity:
      integration: adaptive_cover_pro

emergency_stop:
  name: Emergency stop
  description: >-
    Panic button — sends stop_cover to every configured cover on the targeted
    instances (capability-checked), regardless of whether the cover is currently
    moving, then disables the integration. With no target, acts on all ACP
    instances and all their covers.
  target:
    entity:
      integration: adaptive_cover_pro

export_config:
  name: Export configuration
  description: >-
    Returns the cover configuration as JSON for use in the simulation notebook.
    Call from Developer Tools > Services, then copy the response and paste it
    into the CONFIG variable in notebooks/simulate_cover.ipynb.
  fields:
    config_entry_id:
      name: Cover configuration
      description: The Adaptive Cover Pro configuration entry to export.
      required: true
      selector:
        config_entry:
          integration: adaptive_cover_pro
