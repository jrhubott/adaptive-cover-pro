---
name: "Bug report"
description: "Report a bug with the integration"
labels: "bug"
body:
  - type: markdown
    attributes:
      value: >
        Before opening a bug report, work through the [Troubleshooting wiki page](https://github.com/jrhubott/adaptive-cover-pro/wiki/Troubleshooting) — it covers the most common causes of unexpected behavior with step-by-step diagnostics.
        If you're still stuck after checking those steps, fill out the form below.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have worked through the [Troubleshooting wiki page](https://github.com/jrhubott/adaptive-cover-pro/wiki/Troubleshooting) and my issue is not covered there.
          required: true
        - label: I have confirmed I am running the [latest release](https://github.com/jrhubott/adaptive-cover-pro/releases/latest).
          required: true
        - label: I have searched [existing bug reports](https://github.com/jrhubott/adaptive-cover-pro/issues?q=is%3Aissue+label%3Abug) and this is not a duplicate.
          required: true
        - label: This report covers a single bug (open a separate issue for each additional bug).
          required: true
        - label: I have attached the diagnostics file as an upload (drag-and-drop the JSON file into the Diagnostics field below — do **not** paste its contents). See [Downloading Diagnostics](https://github.com/jrhubott/adaptive-cover-pro/wiki/Configuration-Debug-Diagnostics#downloading-diagnostics).
          required: true

  - type: input
    id: version
    validations:
      required: true
    attributes:
      label: Adaptive Cover Pro version
      description: "Found under Settings → Devices & Services → Adaptive Cover Pro."
      placeholder: "e.g. 2.18.1"

  - type: input
    id: homeassistant
    validations:
      required: true
    attributes:
      label: Home Assistant version
      description: >
        Found in: [**Settings** > **About**](https://my.home-assistant.io/redirect/info/).
      placeholder: "e.g. 2025.4.0"

  - type: input
    id: cover_type
    attributes:
      label: Cover type
      description: "Vertical blind, horizontal awning, or venetian/tilt."
      placeholder: "e.g. Vertical blind"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Describe the issue
      description: "A clear description of what happened and what you expected instead."
      placeholder: |
        What happened?

        What did you expect to happen?

        What does sensor.{device}_decision_trace show? (state and trace attribute if relevant)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reproduction steps
      description: "Steps to reproduce the issue. Without these, it will be hard to investigate."
      value: |
        1.
        2.
        3.
        ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Diagnostics file (attachment)
      description: >
        **Drag the JSON file into this box. Do not paste the file contents** — issues without an attached diagnostics file will be auto-labeled `needs-diagnostics` and closed after 7 days.


        Download from **Settings → Devices & Services → Adaptive Cover Pro** → select the affected cover → **⋮ → Download diagnostics**.
        See [Downloading Diagnostics](https://github.com/jrhubott/adaptive-cover-pro/wiki/Configuration-Debug-Diagnostics#downloading-diagnostics) for step-by-step instructions.


        If GitHub refuses the `.json` file on drag-drop, zip it first or rename the file to `.txt`.
    validations:
      required: false
