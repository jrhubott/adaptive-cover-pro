---
name: "Documentation issue"
description: "Report missing, incorrect, or unclear documentation"
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: >
        Use this template to report problems with documentation — missing steps, outdated info, unclear descriptions, or broken links.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched [existing documentation issues](https://github.com/jrhubott/adaptive-cover-pro/issues?q=is%3Aissue+label%3Adocumentation) and this hasn't already been reported.
          required: true

  - type: input
    id: version
    attributes:
      label: Adaptive Cover Pro version
      description: "Relevant if the documentation issue is version-specific."
      placeholder: "e.g. 2.18.1"
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Where is the documentation issue?
      description: "Link to the page, section, or file (e.g. a wiki page URL, README section, or config flow label)."
      placeholder: "e.g. https://github.com/jrhubott/adaptive-cover-pro/wiki/Troubleshooting — Step 3"
    validations:
      required: true

  - type: textarea
    attributes:
      label: What is wrong or missing?
      description: "Describe the problem clearly."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Suggested improvement
      description: "What should it say, or what information is missing?"
    validations:
      required: false
