---
name: "Feature request"
description: "Suggest an idea for this project"
labels: "enhancement"
body:
  - type: markdown
    attributes:
      value: >
        Before opening a feature request, search [existing requests](https://github.com/jrhubott/adaptive-cover-pro/issues?q=is%3Aissue+label%3A%22Feature+Request%22) to see if yours has already been suggested.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched [existing feature requests](https://github.com/jrhubott/adaptive-cover-pro/issues?q=is%3Aissue+label%3A%22Feature+Request%22) and this is not a duplicate.
          required: true
        - label: This request covers a single feature (open a separate issue for each feature).
          required: true
        - label: I have filled out the template below.
          required: true

  - type: input
    id: version
    attributes:
      label: Adaptive Cover Pro version
      description: "Found under Settings → Devices & Services → Adaptive Cover Pro."
      placeholder: "e.g. 2.18.1"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Is your feature request related to a problem?
      description: "A clear description of what the problem is."
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: "A clear description of what you want to happen."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives you've considered
      description: "Any alternative solutions or features you've thought about."
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
      description: "Any other context, screenshots, or examples."
    validations:
      required: false
