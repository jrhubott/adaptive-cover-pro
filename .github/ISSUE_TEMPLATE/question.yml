---
name: "Question"
description: "Ask a question about setup, configuration, or behavior"
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: >
        Before asking, check the [wiki](https://github.com/jrhubott/adaptive-cover-pro/wiki) — most configuration and setup questions are answered there.
        For bugs, use the **Bug report** template instead.

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have checked the [wiki](https://github.com/jrhubott/adaptive-cover-pro/wiki) and [existing questions](https://github.com/jrhubott/adaptive-cover-pro/issues?q=is%3Aissue+label%3Aquestion) and didn't find an answer.
          required: true

  - type: input
    id: version
    attributes:
      label: Adaptive Cover Pro version
      description: "Found under Settings → Devices & Services → Adaptive Cover Pro."
      placeholder: "e.g. 2.18.1"
    validations:
      required: true

  - type: input
    id: cover_type
    attributes:
      label: Cover type
      description: "Vertical blind, horizontal awning, or venetian/tilt."
      placeholder: "e.g. Vertical blind"
    validations:
      required: false

  - type: textarea
    attributes:
      label: Your question
      description: "Be as specific as possible. Include your configuration details if relevant."
    validations:
      required: true
