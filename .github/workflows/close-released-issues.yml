name: "Close Issues on Stable Release"

on:
  release:
    types: [published]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-released-issues:
    name: "Close issues included in this stable release"
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4.2.1
        with:
          fetch-depth: 0

      - name: "Resolve previous stable tag"
        id: tags
        run: |
          CURRENT="${{ github.event.release.tag_name }}"

          PREV=$(git tag --sort=-v:refname \
                   | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                   | grep -vxF "$CURRENT" \
                   | head -n1)

          if [ -z "$PREV" ]; then
            # First stable release — sweep from the very first commit
            PREV=$(git rev-list --max-parents=0 HEAD | tail -n1)
            echo "No prior stable tag found; using first commit: $PREV"
          else
            echo "Previous stable tag: $PREV"
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: "Collect issue references in release range"
        id: issues
        run: |
          CURRENT="${{ steps.tags.outputs.current }}"
          PREV="${{ steps.tags.outputs.prev }}"
          REPO="${{ github.repository }}"

          # Extract #N references from commit messages in the range
          COMMIT_REFS=$(git log --format='%s%n%b' "${PREV}..${CURRENT}" \
            | grep -oiE '(refs|closes|fixes|resolves|related to)[[:space:]]*[:#]?[[:space:]]*#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#')

          # Also look up any squash-merge PRs (pattern: "(#N)" in subject line)
          PR_NUMS=$(git log --format='%s' "${PREV}..${CURRENT}" \
            | grep -oE '\(#[0-9]+\)' \
            | grep -oE '[0-9]+')

          PR_ISSUE_REFS=""
          for PR in $PR_NUMS; do
            REFS=$(gh pr view "$PR" --repo "$REPO" \
                     --json closingIssuesReferences,body \
                     --jq '[.closingIssuesReferences[].number] | map(tostring) | join(" ")' \
                     2>/dev/null || echo "")
            BODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body // ""' 2>/dev/null || echo "")
            BODY_REFS=$(echo "$BODY" \
              | grep -oiE '(refs|closes|fixes|resolves|related to)[[:space:]]*[:#]?[[:space:]]*#[0-9]+' \
              | grep -oE '#[0-9]+' \
              | tr -d '#' \
              | tr '\n' ' ')
            PR_ISSUE_REFS="$PR_ISSUE_REFS $REFS $BODY_REFS"
          done

          ALL=$(echo "$COMMIT_REFS $PR_ISSUE_REFS" \
                  | tr ' ' '\n' \
                  | grep -E '^[0-9]+$' \
                  | sort -un \
                  | tr '\n' ' ')
          echo "issues=$ALL" >> "$GITHUB_OUTPUT"
          echo "Found issue references: $ALL"

      - name: "Close issues and remove awaiting-release label"
        run: |
          CURRENT="${{ steps.tags.outputs.current }}"
          REPO="${{ github.repository }}"
          ISSUES="${{ steps.issues.outputs.issues }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${CURRENT}"

          if [ -z "$ISSUES" ]; then
            echo "No issue references found — nothing to close."
            echo "No issues to close." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          CLOSED=""
          for N in $ISSUES; do
            STATE=$(gh issue view "$N" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "")
            if [ "$STATE" != "OPEN" ]; then
              echo "Issue #$N is not open (state=$STATE) — skipping."
              continue
            fi

            echo "Removing awaiting-release label from #$N (if present)..."
            gh issue edit "$N" --repo "$REPO" --remove-label "awaiting-release" 2>/dev/null || true

            echo "Closing issue #$N..."
            gh issue close "$N" --repo "$REPO" \
              --comment "Released in [${CURRENT}](${RELEASE_URL})."

            CLOSED="$CLOSED #$N"
          done

          echo "### Issues closed by ${CURRENT}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$CLOSED" ]; then
            echo "Closed:$CLOSED" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All referenced issues were already closed." >> "$GITHUB_STEP_SUMMARY"
          fi
